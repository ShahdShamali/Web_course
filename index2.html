<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>course</title>
    <link rel="stylesheet" href="style.css">
</head>
    <h1 class="programming">Programming Training</h1>
<body class="body">
    <form method="post">
        <div>
            <label for="First_Name">First Name: </label>
            <div>
                <input type="text" id="First_Name" placeholder="First Name" required>
            </div>
        </div>
        <div>
        <label for="Last_Name">Last Name: </label>
        <div>
            <input type="text" id="Last_Name" placeholder="Last name" required>
            </div>
        </div>
        <div>
            <label for="Email"> Email:</label>
            <div>
                <input type="email" id="Email" placeholder="Email" required>
            </div>
        </div>
        <div>
            <label for="Password">Password:</label>
            <div>
                <input type="password" id="Password" placeholder="Password" required>
            </div>
        </div>
        <div>
            <label for="confirm_Password">Confirm Password:</label>
            <div>
                <input type="password" id="confirm_Password" placeholder="Confirm Password" required>
            </div>
        </div>
        <div>
            <label for="Age">Age:</label>
            <div>
                <input type="number" id="Age" placeholder="Age" required>
            </div>
        </div>
        <div>
            <div>
                <label>Enter your Gender:</label>
            </div>
            <input type="radio" name="Gender" id="Male" required>
            <label for="Male">Male</label>
            <input type="radio" name="Gender" id="Female" required>
            <label for="Female" >Female</label>
            <input type="radio" name="Gender" id="not" required>
            <label for="not">Not yet</label>
        </div>
        <div>
            <label for="Date_of_Birthday">Date of Birth:</label>
            <div>
                <input type="date" id="Date_of_Birthday" required>
            </div>
        </div>
        <div>
            <label for="Planguage">Enter your favorite programming language</label>
            <div>
                <select id="Planguage">
                    <option value="Java">Java</option>
                    <option value="Python">Python</option>
                    <option value="C++">C++</option>
                    <option value="C">C</option>
                    <option value="Java Script">Java Script</option>
                    <option value="C#"> C# </option>
                    <option value="select">other</option>
                </select>
            </div>
        </div>
        <div>
            <label for="comment">Enter your comment:</label>
            <div>
                <textarea name="comment" id="comment" cols="30" rows="3"></textarea>
            </div>
        </div>
        <div>
            <input type="checkbox" name="approve" id="approve" required>
            <label for="approve">I am agree with my information</label>
        </div>
       <button>Submit</button>
    </form>
</body>
</html>
